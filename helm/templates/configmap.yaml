apiVersion: v1
kind: ConfigMap

metadata:
  name: {{ .Chart.Name }}-config
  namespace: {{ .Release.Namespace }}

data:
  APP_NAME: {{ .Values.config.APPLICATION_NAME | quote }}
  COMPANY_NAME: {{ .Values.config.COMPANY_NAME | quote }}
  LOG_LEVEL: {{ .Values.config.LOG_LEVEL | quote }}

  DB_HOST: {{ printf "%s-postgresql" .Release.Name | quote }}
  DB_PORT: "5432"
  DB_NAME: {{ .Values.postgresql.auth.database | quote }}
  DB_USER: {{ .Values.postgresql.auth.username | quote }}
